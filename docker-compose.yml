services:
  db:
    image: postgres:15
    container_name: postgres_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: app_container
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8080:8080"
    networks:
      - auth-network
    env_file:
      - .env
    depends_on:
      - db

  maven-test:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: maven_test_container
    volumes:
      - .:/app
    working_dir: /app
    command: tail -f /dev/null
    networks:
      - auth-network

volumes:
  postgres_data:

networks:
  auth-network: